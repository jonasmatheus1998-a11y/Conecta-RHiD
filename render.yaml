services:
  - type: web
    name: conecta-rhid
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_PATH
        value: /data/conecta-rhid.sqlite
      - key: ADMIN_EMAIL
        value: admin@conecta.com
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: conecta-rhid-data
      mountPath: /data
      sizeGB: 1
